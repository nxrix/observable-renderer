<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./notebook.css">
  <title>Notebook</title>
</head>
<body>
<script type="module">
import { render } from "./renderer.js";
render([
  `viewof a = Inputs.range([0, 100], { value: 10, label: "A" })`,
  `viewof b = Inputs.range([0, 100], { value: 20, label: "B" })`,
  `sum = a + b`,
  `html\`<h2>Sum = \${sum}</h2>\``,
  `viewof observable`,
  `import { viewof observable } from "@nxrix/palettes"`
]);
</script>
</body>
</html>
